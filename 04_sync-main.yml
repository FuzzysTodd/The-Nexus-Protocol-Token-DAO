name: Sync main into feature branches

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 */6 * * *" # every 6 hours

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync main into branches
        run: |
          git pull origin main
          git push || true
