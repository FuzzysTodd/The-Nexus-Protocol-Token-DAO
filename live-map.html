<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nexus – Live Trade Map</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #020617;
            --panel: rgba(8, 18, 38, 0.92);
            --text: #e2e8f0;
            --muted: #64748b;
            --accent: #38bdf8;
            --green: #4ade80;
            --red: #f87171;
            --orange: #fb923c;
            --purple: #a78bfa;
            --border: rgba(148, 163, 184, 0.12);
            --shadow: 0 24px 60px rgba(2, 6, 23, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ── Header ── */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 200;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .back-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.78rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
            white-space: nowrap;
        }
        .back-link:hover { color: var(--accent); }

        .sep { color: var(--border); }

        .page-title {
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        /* ── Status badge ── */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .badge-live { background: rgba(74, 222, 128, 0.12); color: var(--green); }
        .badge-live .status-dot { background: var(--green); animation: blink 1.4s infinite; }
        .badge-demo { background: rgba(251, 146, 60, 0.12); color: var(--orange); }
        .badge-demo .status-dot { background: var(--orange); }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── Stats bar ── */
        .stats-bar {
            position: fixed;
            top: 50px;
            left: 0; right: 0;
            height: 42px;
            display: flex;
            align-items: stretch;
            background: rgba(2, 6, 23, 0.75);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            z-index: 190;
            scrollbar-width: none;
        }
        .stats-bar::-webkit-scrollbar { display: none; }

        .stat-item {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 18px;
            border-right: 1px solid var(--border);
            min-width: 120px;
            flex-shrink: 0;
        }

        .stat-label {
            font-size: 0.6rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            line-height: 1;
            margin-bottom: 3px;
        }

        .stat-value {
            font-size: 0.9rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--accent);
            line-height: 1;
        }

        .stat-value.green { color: var(--green); }
        .stat-value.orange { color: var(--orange); }

        /* ── Main layout ── */
        .app {
            position: fixed;
            top: 92px;   /* header 50 + stats 42 */
            bottom: 0;
            left: 0;
            right: 0;
            display: grid;
            grid-template-columns: 1fr 300px;
        }

        @media (max-width: 780px) {
            .app {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 220px;
            }
            .feed-panel { border-left: none; border-top: 1px solid var(--border); }
        }

        /* ── Globe panel ── */
        .globe-panel {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(ellipse at 40% 50%, #071228 0%, #020617 70%);
        }

        #globe { display: block; }

        /* ── Feed panel ── */
        .feed-panel {
            border-left: 1px solid var(--border);
            background: var(--panel);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .feed-header {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .feed-header-right {
            margin-left: auto;
            font-weight: 400;
            color: var(--muted);
            font-size: 0.68rem;
            letter-spacing: 0;
            text-transform: none;
        }

        .feed-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(148,163,184,0.15) transparent;
        }
        .feed-list::-webkit-scrollbar { width: 3px; }
        .feed-list::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.2); border-radius: 4px; }

        .feed-item {
            padding: 8px 14px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.05);
            display: grid;
            grid-template-columns: 9px 1fr auto;
            gap: 9px;
            align-items: center;
            font-size: 0.75rem;
            animation: slide-in 0.25s ease;
        }

        @keyframes slide-in {
            from { opacity: 0; transform: translateX(14px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .feed-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .feed-dot.buy   { background: var(--green);  box-shadow: 0 0 5px rgba(74,222,128,0.5); }
        .feed-dot.sell  { background: var(--red);    box-shadow: 0 0 5px rgba(248,113,113,0.5); }
        .feed-dot.stake { background: var(--accent); box-shadow: 0 0 5px rgba(56,189,248,0.5); }
        .feed-dot.swap  { background: var(--purple); box-shadow: 0 0 5px rgba(167,139,250,0.5); }

        .feed-body { min-width: 0; }

        .feed-route {
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.74rem;
        }

        .feed-meta {
            color: var(--muted);
            font-size: 0.67rem;
            margin-top: 2px;
        }

        .feed-amount {
            text-align: right;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            font-size: 0.73rem;
        }
        .feed-amount.buy   { color: var(--green); }
        .feed-amount.sell  { color: var(--red); }
        .feed-amount.stake { color: var(--accent); }
        .feed-amount.swap  { color: var(--purple); }

        /* ── Tooltip ── */
        #tooltip {
            position: fixed;
            pointer-events: none;
            background: rgba(8, 18, 38, 0.96);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 7px;
            padding: 6px 11px;
            font-size: 0.74rem;
            color: var(--text);
            backdrop-filter: blur(8px);
            display: none;
            z-index: 300;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }

        /* ── Trade popups ── */
        #popup-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 7px;
            z-index: 300;
            pointer-events: none;
        }

        .trade-popup {
            background: rgba(8, 18, 38, 0.96);
            border: 1px solid var(--border);
            border-left: 3px solid var(--green);
            border-radius: 8px;
            padding: 8px 13px;
            font-size: 0.74rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            animation: pop-in 0.28s ease, pop-out 0.28s ease 2.72s forwards;
            max-width: 280px;
            line-height: 1.5;
        }
        .trade-popup.sell  { border-left-color: var(--red); }
        .trade-popup.stake { border-left-color: var(--accent); }
        .trade-popup.swap  { border-left-color: var(--purple); }

        @keyframes pop-in  { from { opacity:0; transform:translateX(-14px); } to { opacity:1; transform:translateX(0); } }
        @keyframes pop-out { from { opacity:1; } to { opacity:0; } }
    </style>
</head>

<div id="tooltip" role="tooltip"></div>

<script>
/* ============================================================
   NEXUS LIVE TRADE MAP
   Self-contained canvas globe visualizer.
   - Rotating orthographic 3D globe with continent outlines
   - Animated trade arcs between global financial hubs
   - Connects to nexus-signal-bus on ws://localhost:8790
   - Falls back to simulated demo data automatically
============================================================ */
'use strict';

// ── Configuration constants ───────────────────────────────────
const SIGNAL_BUS_PORT        = 8790;
const ETH_PRICE_USD          = 2800;    // approximate ETH/USD for volume display
const WHALE_PROBABILITY      = 0.04;    // fraction of trades that are "whale" size
const WHALE_MIN_AMOUNT       = 10;      // ETH — minimum whale trade
const WHALE_MAX_AMOUNT       = 80;      // ETH — max additional whale amount
const NORMAL_MAX_AMOUNT      = 3;       // ETH — maximum normal trade
const MIN_TRADE_INTERVAL_MS  = 500;     // ms — minimum time between demo trades
const TRADE_INTERVAL_JITTER  = 700;     // ms — random jitter added to interval

// ── Canvas & sizing ──────────────────────────────────────────
const canvas = document.getElementById('globe');
const ctx    = canvas.getContext('2d');

let R = 200, cx = 260, cy = 260;

function resizeGlobe() {
    const panel = canvas.parentElement;
    const w = panel.clientWidth;
    const h = panel.clientHeight;
    const size = Math.min(w - 20, h - 20, 680);
    canvas.width  = size;
    canvas.height = size;
    R  = size * 0.415;
    cx = size / 2;
    cy = size / 2;
}

window.addEventListener('resize', resizeGlobe);
resizeGlobe();

// ── Globe rotation state ─────────────────────────────────────
let yaw       = 1.0;   // radians — current horizontal rotation
let pulsePhase = 0;
const ROT_SPEED  = 0.0014;  // rad/frame
const GLOBE_TILT = 22 * Math.PI / 180;  // axial tilt for visual realism

// ── 3D orthographic projection ───────────────────────────────
// Returns {x, y, visible, depth} for a lat/lon on the globe.
function project(lat, lon) {
    const phi = lat * Math.PI / 180;
    const lam = lon * Math.PI / 180 + yaw;

    const x3    = Math.cos(phi) * Math.cos(lam);
    const y3raw = Math.cos(phi) * Math.sin(lam);
    const z3raw = Math.sin(phi);

    // Apply tilt (rotation around X axis)
    const y3 = y3raw * Math.cos(GLOBE_TILT) - z3raw * Math.sin(GLOBE_TILT);
    const z3 = y3raw * Math.sin(GLOBE_TILT) + z3raw * Math.cos(GLOBE_TILT);

    return {
        x: cx + R * x3,
        y: cy - R * y3,
        visible: z3 > -0.06,
        depth: z3   // -1 (back) … +1 (front)
    };
}

// Project a point elevated above the sphere surface
// elevation: 0 = on surface, 0.15 = 15% above
function projectElevated(lat, lon, elevation) {
    const p = project(lat, lon);
    if (!p.visible) return p;
    const scale = 1 + elevation;
    return {
        x:       cx + (p.x - cx) * scale,
        y:       cy + (p.y - cy) * scale,
        visible: p.visible,
        depth:   p.depth
    };
}

// ── Simplified continent outlines ────────────────────────────
// Each entry is an array of [lon, lat] pairs forming a closed polygon.
// Approximate coastlines — recognisable on a rotating globe.
const CONTINENTS = [
    // North America
    [[-168,72],[-141,60],[-130,56],[-126,50],[-124,37],[-117,32],
     [-105,22],[-90,16],[-84,10],[-79,8],[-62,11],[-80,25],[-74,40],
     [-66,45],[-52,47],[-56,52],[-80,63],[-100,70],[-120,70],[-168,72]],

    // South America
    [[-79,8],[-77,4],[-60,8],[-52,4],[-48,0],[-36,-5],[-35,-8],
     [-39,-15],[-43,-23],[-51,-30],[-52,-33],[-56,-35],[-66,-52],
     [-72,-54],[-74,-52],[-72,-42],[-71,-30],[-70,-18],[-77,-2],
     [-80,0],[-79,8]],

    // Europe
    [[-10,36],[0,44],[8,44],[14,44],[20,38],[28,40],[30,46],
     [22,50],[14,54],[8,58],[18,60],[28,70],[14,68],[8,62],
     [-4,56],[-8,52],[-10,44],[-10,36]],

    // Africa
    [[-18,16],[-8,24],[-4,20],[2,16],[8,14],[22,12],[36,12],
     [44,8],[44,2],[40,-4],[36,-10],[36,-26],[32,-34],[26,-36],
     [18,-34],[14,-22],[8,-5],[2,5],[-8,4],[-14,10],[-18,16]],

    // Asia (mainland — simplified)
    [[26,72],[80,74],[120,70],[140,68],[168,60],[165,54],
     [140,46],[135,34],[120,30],[115,22],[100,4],[104,1],
     [108,4],[115,22],[120,30],[135,34],[140,36],[130,42],
     [108,42],[100,52],[78,58],[58,68],[26,72]],

    // Australia
    [[114,-22],[124,-14],[136,-12],[138,-14],[142,-10],
     [148,-18],[152,-28],[152,-36],[148,-38],[140,-36],
     [132,-30],[120,-24],[114,-22]],

    // Greenland
    [[-74,82],[-44,82],[-18,72],[-30,70],[-44,68],[-68,72],[-74,82]],

    // Antarctica (partial ring)
    [[-180,-70],[-120,-68],[-60,-72],[0,-68],[60,-68],[120,-68],
     [180,-70],[180,-90],[-180,-90],[-180,-70]]
];

// ── Draw one continent polygon ────────────────────────────────
function drawContinent(points) {
    let inPath = false;
    ctx.beginPath();
    for (let i = 0; i < points.length; i++) {
        const [lon, lat] = points[i];
        const p = project(lat, lon);
        if (p.visible) {
            if (!inPath) { ctx.moveTo(p.x, p.y); inPath = true; }
            else ctx.lineTo(p.x, p.y);
        } else {
            inPath = false;
        }
    }
    // Close to fill partial polygons cleanly
    ctx.closePath();
}

// ── Latitude / longitude grid lines ─────────────────────────
function drawGrid() {
    ctx.strokeStyle = 'rgba(56,189,248,0.07)';
    ctx.lineWidth   = 0.5;

    // Parallels (latitude lines)
    for (let lat = -80; lat <= 80; lat += 20) {
        ctx.beginPath();
        let first = true;
        for (let lon = -180; lon <= 180; lon += 5) {
            const p = project(lat, lon);
            if (p.visible) {
                if (first) { ctx.moveTo(p.x, p.y); first = false; }
                else ctx.lineTo(p.x, p.y);
            } else { first = true; }
        }
        ctx.stroke();
    }

    // Meridians (longitude lines)
    for (let lon = -180; lon < 180; lon += 30) {
        ctx.beginPath();
        let first = true;
        for (let lat = -85; lat <= 85; lat += 5) {
            const p = project(lat, lon);
            if (p.visible) {
                if (first) { ctx.moveTo(p.x, p.y); first = false; }
                else ctx.lineTo(p.x, p.y);
            } else { first = true; }
        }
        ctx.stroke();
    }
}

// ── Trade hub definitions ─────────────────────────────────────
const HUBS = [
    { lat: 40.7,  lon: -74.0, name: 'New York',       type: 'exchange' },

    { lat: 25.2,  lon:  55.3, name: 'Dubai',          type: 'exchange' },

    { lat: 41.9,  lon: -87.6, name: 'Chicago',        type: 'exchange' },
    { lat: 37.8,  lon:-122.4, name: 'San Francisco',  type: 'dex'      },
    { lat: 43.7,  lon: -79.4, name: 'Toronto',        type: 'exchange' },
    { lat: 52.5,  lon:  13.4, name: 'Berlin',         type: 'dex'      },
    { lat: 55.8,  lon:  37.6, name: 'Moscow',         type: 'exchange' },
    { lat: 47.4,  lon:   8.5, name: 'Zurich',         type: 'exchange' },
    { lat: 33.9,  lon:-118.4, name: 'Los Angeles',    type: 'dex'      },
    { lat: 25.8,  lon: -80.2, name: 'Miami',          type: 'dex'      },
    { lat:-26.2,  lon:  28.0, name: 'Johannesburg',   type: 'exchange' },
    { lat: 30.1,  lon:  31.2, name: 'Cairo',          type: 'exchange' },
    { lat: 39.9,  lon: 116.4, name: 'Beijing',        type: 'exchange' },
    { lat: 28.6,  lon:  77.2, name: 'Delhi',          type: 'dex'      },

    { lat: 37.0,  lon:  -7.9, name: 'Lisbon',         type: 'exchange' },
    { lat:-34.6,  lon: -58.4, name: 'Buenos Aires',   type: 'exchange' },
    { lat: 19.4,  lon: -99.1, name: 'Mexico City',    type: 'exchange' },
    { lat:-36.9,  lon: 174.8, name: 'Auckland',       type: 'dex'      },
    { lat: 59.3,  lon:  18.1, name: 'Stockholm',      type: 'dex'      },
    { lat: 52.4,  lon:  16.9, name: 'Warsaw',         type: 'dex'      },
    { lat: 23.1,  lon: 113.3, name: 'Guangzhou',      type: 'exchange' },
    { lat: 12.9,  lon:  77.6, name: 'Bangalore',      type: 'dex'      },
    { lat:-33.5,  lon: -70.7, name: 'Santiago',       type: 'exchange' },
    { lat: 29.8,  lon: -95.4, name: 'Houston',        type: 'exchange' },
    { lat: 13.1,  lon:  80.3, name: 'Chennai',        type: 'dex'      },
    { lat: 55.7,  lon:  12.6, name: 'Copenhagen',     type: 'dex'      }
];

// ── Active trade arcs ─────────────────────────────────────────
const arcs = [];

// ARC_COLORS: each entry is { trail: rgba string, dot: hex }
const ARC_COLORS = {
    buy:   { trail: 'rgba(74,222,128,',  dot: '#4ade80' },
    sell:  { trail: 'rgba(248,113,113,', dot: '#f87171' },
    stake: { trail: 'rgba(56,189,248,',  dot: '#38bdf8' },
    swap:  { trail: 'rgba(167,139,250,', dot: '#a78bfa' }
};

function addArc(fromIdx, toIdx, type) {
    arcs.push({
        from:  HUBS[fromIdx],
        to:    HUBS[toIdx],
        t:     0,               // 0→1 progress
        speed: 0.007 + Math.random() * 0.006,
        type:  type || 'buy'
    });
}

function drawArc(arc) {
    const { from, to, t, type } = arc;
    const col = ARC_COLORS[type] || ARC_COLORS.buy;
    const STEPS = 50;
    const trailStart = Math.max(0, t - 0.38);

    ctx.beginPath();
    let pathStarted = false;

    for (let i = 0; i <= STEPS; i++) {
        const s     = trailStart + (t - trailStart) * (i / STEPS);
        const lat   = from.lat + (to.lat - from.lat) * s;
        const lon   = from.lon + (to.lon - from.lon) * s;
        const elev  = Math.sin(s * Math.PI) * 0.14;  // arc lifts at midpoint
        const p     = projectElevated(lat, lon, elev);

        if (!p.visible) { pathStarted = false; continue; }

        if (!pathStarted) { ctx.moveTo(p.x, p.y); pathStarted = true; }
        else ctx.lineTo(p.x, p.y);
    }

    ctx.strokeStyle = col.trail + '0.55)';
    ctx.lineWidth   = 1.4;
    ctx.stroke();

    // Leading dot at arc head
    const headLat = from.lat + (to.lat - from.lat) * t;
    const headLon = from.lon + (to.lon - from.lon) * t;
    const headElev = Math.sin(t * Math.PI) * 0.14;
    const head = projectElevated(headLat, headLon, headElev);
    if (head.visible) {
        ctx.beginPath();
        ctx.arc(head.x, head.y, 2.8, 0, Math.PI * 2);
        ctx.fillStyle = col.dot;
        ctx.shadowBlur  = 8;
        ctx.shadowColor = col.dot;
        ctx.fill();
        ctx.shadowBlur  = 0;
    }
}

// ── Draw hub nodes ────────────────────────────────────────────
function drawHubs() {
    HUBS.forEach((hub, idx) => {
        const p = project(hub.lat, hub.lon);
        if (!p.visible) return;

        const isExchange = hub.type === 'exchange';
        const baseR  = isExchange ? 3.2 : 2.4;
        const pulse  = 1 + 0.25 * Math.sin(pulsePhase + idx * 0.55);
        const ringA  = 0.25 + 0.15 * Math.sin(pulsePhase + idx * 0.55);

        // Outer pulse ring
        ctx.beginPath();
        ctx.arc(p.x, p.y, baseR * pulse * 2.2, 0, Math.PI * 2);
        ctx.strokeStyle = isExchange
            ? 'rgba(56,189,248,' + ringA + ')'
            : 'rgba(74,222,128,' + ringA + ')';
        ctx.lineWidth = 0.7;
        ctx.stroke();

        // Core dot
        ctx.beginPath();
        ctx.arc(p.x, p.y, baseR, 0, Math.PI * 2);
        ctx.fillStyle   = isExchange ? '#38bdf8' : '#4ade80';
        ctx.shadowBlur  = 7;
        ctx.shadowColor = isExchange ? '#38bdf8' : '#4ade80';
        ctx.fill();
        ctx.shadowBlur  = 0;
    });
}

// ── Full globe render ─────────────────────────────────────────
function drawGlobe() {
    // Ocean sphere
    const grad = ctx.createRadialGradient(
        cx - R * 0.28, cy - R * 0.28, R * 0.04,
        cx, cy, R
    );
    grad.addColorStop(0,   '#1a3060');
    grad.addColorStop(0.7, '#0b1a38');
    grad.addColorStop(1,   '#020617');
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Sphere rim
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(56,189,248,0.22)';
    ctx.lineWidth   = 1.5;
    ctx.stroke();

    // Grid
    drawGrid();

    // Continents — filled land + outline
    ctx.lineWidth = 0.9;
    CONTINENTS.forEach(pts => {
        drawContinent(pts);
        ctx.fillStyle   = 'rgba(18,45,85,0.75)';
        ctx.strokeStyle = 'rgba(80,170,240,0.55)';
        ctx.fill();
        ctx.stroke();
    });

    // Atmospheric halo
    const halo = ctx.createRadialGradient(cx, cy, R * 0.96, cx, cy, R * 1.08);
    halo.addColorStop(0, 'rgba(56,189,248,0.14)');
    halo.addColorStop(1, 'rgba(56,189,248,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, R * 1.07, 0, Math.PI * 2);
    ctx.fillStyle = halo;
    ctx.fill();
}

// ── Stats helpers ─────────────────────────────────────────────
let totalTrades = 0;
let totalVolumeUSD = 0;
const pairCounts = {};
const startTime = Date.now();

function updateStats() {
    document.getElementById('stat-live').textContent = totalTrades.toLocaleString();
    document.getElementById('stat-vol').textContent  = '$' + fmtVol(totalVolumeUSD);
    document.getElementById('stat-nodes').textContent = HUBS.length;
    const elapsed = Math.max((Date.now() - startTime) / 1000, 1);
    document.getElementById('stat-tps').textContent = (totalTrades / elapsed).toFixed(1);

    // Top pair by count
    let topPair = 'NGTT/ETH', topCount = 0;
    for (const [pair, cnt] of Object.entries(pairCounts)) {
        if (cnt > topCount) { topCount = cnt; topPair = pair; }
    }
    document.getElementById('stat-pair').textContent = topPair;
}

function fmtVol(v) {
    if (v >= 1e9) return (v / 1e9).toFixed(2) + 'B';
    if (v >= 1e6) return (v / 1e6).toFixed(2) + 'M';
    if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
    return v.toFixed(0);
}

function escHtml(s) {
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

// ── Live feed ─────────────────────────────────────────────────
const MAX_FEED = 90;

function addFeedItem(ev) {
    const list  = document.getElementById('feed-list');
    const el    = document.createElement('div');
    el.className = 'feed-item';
    const time = new Date().toLocaleTimeString('en-US', { hour12: false });
    const amt  = ev.amount >= 1 ? ev.amount.toFixed(2) : ev.amount.toFixed(4);
    const tag  = ev.type.toUpperCase().slice(0, 5);
    el.innerHTML =
        '<span class="feed-dot ' + ev.type + '" aria-hidden="true"></span>' +
        '<div class="feed-body">' +
            '<div class="feed-route">' + escHtml(ev.from) + ' → ' + escHtml(ev.to) + '</div>' +
            '<div class="feed-meta">' + tag + ' · ' + escHtml(ev.pair) + ' · ' + time + '</div>' +
        '</div>' +
        '<div class="feed-amount ' + ev.type + '">' + amt + ' ETH</div>';
    list.insertBefore(el, list.firstChild);
    while (list.children.length > MAX_FEED) list.removeChild(list.lastChild);
}

// ── Popup toast ───────────────────────────────────────────────
function showPopup(ev) {
    const container = document.getElementById('popup-container');
    const div = document.createElement('div');
    div.className = 'trade-popup ' + ev.type;
    const amt = ev.amount >= 1 ? ev.amount.toFixed(2) : ev.amount.toFixed(4);
    div.innerHTML =
        '<strong>' + escHtml(ev.pair) + '</strong> ' + ev.type.toUpperCase() +
        ' <strong>' + amt + ' ETH</strong><br>' +
        '<span style="color:var(--muted);font-size:0.68rem">' + escHtml(ev.from) + ' → ' + escHtml(ev.to) + '</span>';
    container.appendChild(div);
    setTimeout(() => { if (div.parentNode) div.parentNode.removeChild(div); }, 3100);
    while (container.children.length > 4) container.removeChild(container.firstChild);
}

// ── Shared event handler ──────────────────────────────────────
function onTradeEvent(ev) {
    totalTrades++;
    totalVolumeUSD += ev.amount * ETH_PRICE_USD;
    pairCounts[ev.pair] = (pairCounts[ev.pair] || 0) + 1;

    addArc(ev.fromIdx, ev.toIdx, ev.type);
    addFeedItem(ev);
    if (Math.random() < 0.14) showPopup(ev);
    if (totalTrades % 4 === 0) updateStats();
}

// ── Demo trade generator ──────────────────────────────────────
const PAIRS = [
    'NGTT/ETH', 'ETH/USDC', 'WBTC/ETH', 'ETH/DAI',
    'NGTT/USDC', 'ETH/USDT', 'wstETH/ETH', 'NGTT/DAI',
    'cbETH/ETH', 'ETH/WBTC'
];
const TYPES = [
    'buy', 'buy', 'buy', 'sell', 'sell', 'swap', 'swap', 'stake'
];

function randomTrade() {
    const fromIdx = Math.floor(Math.random() * HUBS.length);
    let toIdx     = Math.floor(Math.random() * HUBS.length);
    while (toIdx === fromIdx) toIdx = Math.floor(Math.random() * HUBS.length);

    const type   = TYPES[Math.floor(Math.random() * TYPES.length)];
    const amount = Math.random() < WHALE_PROBABILITY
        ? WHALE_MIN_AMOUNT + Math.random() * WHALE_MAX_AMOUNT
        : Math.random() * NORMAL_MAX_AMOUNT;
    const pair = PAIRS[Math.floor(Math.random() * PAIRS.length)];

    return { fromIdx, toIdx, from: HUBS[fromIdx].name, to: HUBS[toIdx].name, type, pair, amount };
}

// ── Demo mode ─────────────────────────────────────────────────
let demoInterval = null;

function startDemo() {
    const badge = document.getElementById('status-badge');
    badge.className = 'status-badge badge-demo';
    document.getElementById('status-text').textContent = 'Demo Mode';

    // Seed initial burst
    for (let i = 0; i < 10; i++) {
        setTimeout(() => onTradeEvent(randomTrade()), i * 180);
    }

    if (!demoInterval) {
        demoInterval = setInterval(() => {
            const n = Math.random() < 0.22 ? 2 : 1;
            for (let i = 0; i < n; i++) onTradeEvent(randomTrade());
        }, MIN_TRADE_INTERVAL_MS + Math.random() * TRADE_INTERVAL_JITTER);
    }
}

function stopDemo() {
    if (demoInterval) { clearInterval(demoInterval); demoInterval = null; }
}

// ── WebSocket (nexus-signal-bus) ──────────────────────────────
let ws    = null;
let wsOK  = false;

function connectWS() {
    const url = 'ws://' + (location.hostname || 'localhost') + ':' + SIGNAL_BUS_PORT;
    try { ws = new WebSocket(url); }
    catch (_) { startDemo(); return; }

    ws.addEventListener('open', () => {
        wsOK = true;
        stopDemo();
        const badge = document.getElementById('status-badge');
        badge.className = 'status-badge badge-live';
        document.getElementById('status-text').textContent = 'Live · Signal Bus';
    });

    ws.addEventListener('message', (evt) => {
        try {
            const msg   = JSON.parse(evt.data);
            const evtLc = String(msg.event || '').toLowerCase();
            const type  = evtLc.includes('sell')  ? 'sell'
                        : evtLc.includes('stake')  ? 'stake'
                        : evtLc.includes('swap')   ? 'swap'
                        : 'buy';
            const fromIdx = Math.floor(Math.random() * HUBS.length);
            let   toIdx   = Math.floor(Math.random() * HUBS.length);
            while (toIdx === fromIdx) toIdx = Math.floor(Math.random() * HUBS.length);
            const amount  = parseFloat(msg.amount || msg.value || Math.random() * 2) || Math.random() * 2;
            onTradeEvent({
                fromIdx, toIdx,
                from:   HUBS[fromIdx].name,
                to:     HUBS[toIdx].name,
                type,
                pair:   String(msg.pair || msg.token || 'NGTT/ETH'),
                amount
            });
        } catch (err) { console.warn('[live-map] WS message parse error:', err); }
    });

    ws.addEventListener('close', () => {
        wsOK = false;
        startDemo();
        setTimeout(connectWS, 5000);
    });

    ws.addEventListener('error', () => {
        if (!demoInterval) startDemo();
    });
}

// ── Tooltip on hover ──────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    let hit = null;
    HUBS.forEach(hub => {
        const p = project(hub.lat, hub.lon);
        if (!p.visible) return;
        const dx = p.x - mx, dy = p.y - my;
        if (Math.sqrt(dx * dx + dy * dy) < 10) hit = hub;
    });

    if (hit) {
        tooltip.style.display = 'block';
        tooltip.style.left    = (e.clientX + 14) + 'px';
        tooltip.style.top     = (e.clientY - 10) + 'px';
        tooltip.textContent   = hit.name + ' · ' + hit.type.toUpperCase();
    } else {
        tooltip.style.display = 'none';
    }
});

canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

// ── Animation loop ────────────────────────────────────────────
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Clip rendering to the sphere
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.clip();

    drawGlobe();

    // Advance and draw arcs
    for (let i = arcs.length - 1; i >= 0; i--) {
        drawArc(arcs[i]);
        arcs[i].t += arcs[i].speed;
        if (arcs[i].t >= 1) arcs.splice(i, 1);
    }

    drawHubs();

    ctx.restore();

    // Advance state
    yaw        += ROT_SPEED;
    pulsePhase += 0.038;

    requestAnimationFrame(animate);
}

// ── Boot ──────────────────────────────────────────────────────
connectWS();
// If WS doesn't connect within 1.5 s, start demo automatically
setTimeout(() => { if (!wsOK && !demoInterval) startDemo(); }, 1500);
updateStats();
animate();
</script>
