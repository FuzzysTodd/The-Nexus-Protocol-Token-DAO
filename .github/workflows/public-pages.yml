name: Public DAO Pages

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - "index.html"
      - "financial-ops-dashboard.html"
      - "approval-service.html"
      - "governance.html"
      - "withdraw.html"
      - "docs/**"
      - "nexus/**"
      - "ops/reports/**"
      - "financial-ops-rest-server.js"
      - "approval-service-server.js"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "public-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate Latest Financial Ops Report
        run: |
          python nexus/finance_ops_report.py \
            --root . \
            --manifest mcp/agents/financial-ops-bots.json \
            --output-json ops/reports/financial-ops-report.json \
            --output-md ops/reports/financial-ops-report.md

      - name: Build Pages Site
        run: |
          python - <<'PYTHON'
          import json
          import shutil
          from pathlib import Path

          root = Path('.')
          site = root / 'site'
          site.mkdir(exist_ok=True)

          public_files = [
              'index.html',
              'financial-ops-dashboard.html',
              'approval-service.html',
              'governance.html',
              'withdraw.html',
              'docs/DAO_AUTOMATION_ROADMAP.md',
              'ops/reports/financial-ops-report.md',
              'ops/reports/financial-ops-report.json',
              'ops/reports/progress-report.md',
              '.approval-service-state.json',
          ]

          for relative_path in public_files:
              source = root / relative_path
              if not source.exists():
                  continue
              destination = site / relative_path
              destination.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(source, destination)

          status_payload = {
              'generatedAt': None,
              'source': 'GitHub Pages static snapshot',
              'sourceType': 'free-static-storage',
              'note': 'Static snapshot published via GitHub Pages.',
          }

          report_path = root / 'ops' / 'reports' / 'financial-ops-report.json'
          if report_path.exists():
              try:
                  report = json.loads(report_path.read_text())
                  status_payload['generatedAt'] = report.get('generatedAt')
                  status_payload['summary'] = report.get('summary', {})
                  status_payload['recommendedActions'] = report.get('recommendedActions', [])
              except Exception as exc:
                  status_payload['error'] = str(exc)

          approval_state_path = root / '.approval-service-state.json'
          if approval_state_path.exists():
              try:
                  status_payload['approvalServiceState'] = json.loads(approval_state_path.read_text())
              except Exception as exc:
                  status_payload['approvalServiceError'] = str(exc)

          (site / 'status.json').write_text(json.dumps(status_payload, indent=2))
          PYTHON

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5