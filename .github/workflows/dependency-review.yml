name: "Dependency Review"

on:
  pull_request:
    branches: ["main"]
    paths:
      - "requirements*.txt"
      - "package*.json"
      - ".github/dependabot.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: "Review dependency changes for vulnerabilities"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Dependency Review
        uses: actions/dependency-review-action@3b139cfc5fae8b618d3eae3675e383bb1769c019
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Python-2.0, Unlicense
          comment-summary-in-pr: always
