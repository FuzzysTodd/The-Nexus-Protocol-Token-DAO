name: Validate Content

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  validate-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"

      - name: Install YAML parser
        run: python -m pip install pyyaml

      - name: Validate tracked repository files
        run: |
          python - <<'PYTHON'
          import ast
          import json
          import tempfile
          import subprocess
          from pathlib import Path

          import yaml

          EXCLUDED_DIRS = {
              '.git',
              '.venv',
              '.vs',
              '.pytest_cache',
              '.ruff_cache',
              '.allai',
              'node_modules',
              '__pycache__',
          }

          BINARY_SUFFIXES = {
              '.dll',
              '.db',
              '.pdb',
              '.exe',
              '.lib',
              '.so',
              '.dylib',
              '.bin',
              '.zip',
              '.tar',
              '.gz',
              '.7z',
              '.png',
              '.jpg',
              '.jpeg',
              '.gif',
              '.webp',
              '.ico',
              '.pdf',
          }

          root = Path('.')
          tracked_files = [
              Path(line)
              for line in subprocess.check_output(['git', 'ls-files'], text=True).splitlines()
              if line.strip()
          ]

          counts = {
              'python': 0,
              'json': 0,
              'yaml': 0,
              'html': 0,
              'javascript': 0,
              'text': 0,
          }

          def read_text(path: Path) -> str:
              try:
                  return path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  return path.read_text(encoding='latin-1')

          for relative_path in tracked_files:
              if any(part in EXCLUDED_DIRS for part in relative_path.parts):
                  continue

              path = root / relative_path
              suffix = relative_path.suffix.lower()

              if suffix in BINARY_SUFFIXES:
                  continue

              text = read_text(path)

              if suffix == '.py':
                  ast.parse(text, filename=str(relative_path))
                  counts['python'] += 1
              elif suffix == '.json':
                  try:
                      json.loads(text)
                      counts['json'] += 1
                  except json.JSONDecodeError:
                      js_markers = ('require(', 'module.exports', 'exports.', 'function ', 'const ', 'let ', 'var ')
                      if any(marker in text for marker in js_markers):
                          with tempfile.NamedTemporaryFile('w', suffix='.cjs', delete=True) as temp_file:
                              temp_file.write(text)
                              temp_file.flush()
                              subprocess.run(['node', '--check', temp_file.name], check=True)
                          counts['javascript'] += 1
                      else:
                          raise
              elif suffix in {'.yml', '.yaml'}:
                  yaml.safe_load(text)
                  counts['yaml'] += 1
              elif suffix in {'.html', '.htm'}:
                  lower = text.lstrip().lower()
                  assert lower.startswith('<!doctype html>') or '<html' in lower, f'{relative_path} does not look like HTML'
                  counts['html'] += 1
              elif suffix in {'.js', '.mjs', '.cjs'}:
                  subprocess.run(['node', '--check', str(path)], check=True)
                  counts['javascript'] += 1
              else:
                  assert '\x00' not in text, f'{relative_path} appears to be binary'
                  counts['text'] += 1

          print(
              'Validated '
              f"{counts['python']} Python files, "
              f"{counts['json']} JSON files, "
              f"{counts['yaml']} YAML files, "
              f"{counts['html']} HTML files, "
              f"{counts['javascript']} JavaScript files, "
              f"and {counts['text']} other text files"
          )
          PYTHON