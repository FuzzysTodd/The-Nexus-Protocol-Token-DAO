name: "Auto-Merge Dependabot PRs"

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: "Auto-approve and merge Dependabot minor/patch updates"
    runs-on: ubuntu-latest
    # Only run on Dependabot PRs
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-approve minor and patch updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-patch'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            await github.rest.pulls.createReview({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event:       "APPROVE",
              body:        "✅ Auto-approved by Nexus CI — Dependabot minor/patch update.",
            });
            core.notice("Auto-approved Dependabot PR #" + context.payload.pull_request.number);

      - name: Enable auto-merge for approved Dependabot PRs
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-patch'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            await github.rest.pulls.merge({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              pull_number:  context.payload.pull_request.number,
              merge_method: "squash",
            });
            core.notice("Auto-merged Dependabot PR #" + context.payload.pull_request.number);

      - name: Comment on major updates (require manual review)
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-major' }}
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body:         "⚠️ **Major version update detected.** This PR requires manual review by @FuzzysTodd before merging. Please verify breaking changes before approving.",
            });
