<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nexus – FuzzysTodd Dashboard</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0a0e1a;
            --panel: #111827;
            --panel-alt: #1f2937;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --danger: #f87171;
            --success: #4ade80;
            --success-glow: rgba(74, 222, 128, 0.3);
            --warning: #fbbf24;
            --border: rgba(148, 163, 184, 0.2);
            --shadow: 0 20px 60px rgba(2, 6, 23, 0.5);
        }
        /* ... rest of your dashboard styles ... */
        /* ➤ Green active tab for Approvals */
        .tab-btn.approvals-active, .tab-btn[data-tab="approvals"].active {
            background: var(--success);
            color: #000;
            border-color: transparent;
        }
    </style>
</head>
<body>
<main>
    <h1>⚡ Nexus Dashboard</h1>
    <p class="subtitle">Owner overview &amp; Web3 control center — FuzzysTodd</p>
    <!-- Tab Navigation -->
    <nav class="tab-nav" aria-label="Dashboard sections">
        <button class="tab-btn active" data-tab="overview" aria-label="Overview tab">🏠 Overview</button>
        <button class="tab-btn" data-tab="portfolio" aria-label="Portfolio tab">💼 Portfolio</button>
        <button class="tab-btn" data-tab="governance" aria-label="Governance tab">🗳️ Governance</button>
        <button class="tab-btn" data-tab="treasury" aria-label="Treasury tab">🏦 Treasury</button>
        <button class="tab-btn" data-tab="properties" aria-label="Properties tab">🏠 Properties</button>
        <button class="tab-btn" data-tab="signals" aria-label="Live Signals tab">📡 Live Signals</button>
        <button class="tab-btn" data-tab="config" aria-label="Contract configuration tab">⚙️ Config</button>
        <button class="tab-btn" data-tab="approvals" aria-label="Approvals Service tab">✅ Approvals</button>
    </nav>
    <!-- ...existing tab panels go here... -->
    <!-- Approvals Tab -->
    <div class="tab-panel" id="tab-approvals">
        <section class="panel">
            <h2>✅ Approval Service</h2>
            <p>Manage and audit approval endpoints directly through the Approval Service interface.</p>
            <a href="./approval-service.html" class="btn btn-accent" target="_blank" rel="noopener">Open Approval Service</a>
        </section>
    </div>
</main>
<script>
(function() {
    "use strict";
    // Tab logic with green Approvals tab
    document.querySelectorAll(".tab-btn").forEach(function(btn) {
        btn.addEventListener("click", function() {
            var tab = btn.getAttribute("data-tab");
            document.querySelectorAll(".tab-btn").forEach(function(b) { b.classList.remove("active"); b.classList.remove("approvals-active"); });
            document.querySelectorAll(".tab-panel").forEach(function(p) { p.classList.remove("active"); });
            btn.classList.add("active");
            var panel = document.getElementById("tab-" + tab);
            if (panel) panel.classList.add("active");
            if (tab === "approvals") { btn.classList.add("approvals-active"); }
        });
    });
})();
</script>
</body>
</html>
